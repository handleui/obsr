name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger CLI Build
        if: ${{ steps.release.outputs['apps/cli--release_created'] }}
        run: |
          if [ -z "$CLI_TAG_NAME" ]; then
            echo "Expected CLI_TAG_NAME from release-please, but it was empty."
            exit 1
          fi

          gh workflow run build.yml --ref main -f ref="$CLI_TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLI_TAG_NAME: ${{ steps.release.outputs['apps/cli--tag_name'] }}

      # npm package publishing setup
      - name: Setup Node for npm publish
        if: ${{ steps.release.outputs['packages/sdk--release_created'] }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        if: ${{ steps.release.outputs['packages/sdk--release_created'] }}
        uses: oven-sh/setup-bun@v2

      - name: Update npm for trusted publishing
        if: ${{ steps.release.outputs['packages/sdk--release_created'] }}
        run: npm install -g npm@latest

      - name: Install dependencies
        if: ${{ steps.release.outputs['packages/sdk--release_created'] }}
        run: bun install

      # sdk package
      - name: Build SDK
        if: ${{ steps.release.outputs['packages/sdk--release_created'] }}
        run: bun run build
        working-directory: packages/sdk

      - name: Publish @detent/sdk
        if: ${{ steps.release.outputs['packages/sdk--release_created'] }}
        run: npm publish
        working-directory: packages/sdk
        env:
          NPM_CONFIG_PROVENANCE: false
