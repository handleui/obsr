name: Database Deploy

on:
  push:
    branches: [main]
    paths:
      - "convex/**"
      - "packages/db/drizzle/**"

permissions:
  contents: read

jobs:
  convex:
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.commits.*.modified), 'convex/') || contains(toJSON(github.event.commits.*.added), 'convex/')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  neon:
    runs-on: ubuntu-latest
    if: contains(toJSON(github.event.commits.*.modified), 'packages/db/drizzle/') || contains(toJSON(github.event.commits.*.added), 'packages/db/drizzle/')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: latest
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Neon migrations
        working-directory: packages/db
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
