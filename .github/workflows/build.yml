name: Build
run-name: Build (${{ inputs.ref || github.ref_name }})

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or ref to build (e.g., cli-v0.2.0)."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: CLI Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Determine ref to build
        id: ref
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Extract version from ref
        id: version
        run: |
          REF="${{ steps.ref.outputs.ref }}"
          VERSION=$(echo "$REF" | sed 's|refs/tags/||' | sed 's|^cli-v||' | sed 's|^v||')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=cli-v$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Compile Linux CLI binary
        run: |
          set -euo pipefail
          mkdir -p apps/cli/dist
          cd apps/cli
          VERSION="$(jq -r .version package.json)"
          bun build ./src/index.ts --compile --outfile dist/dt-linux-amd64 --minify \
            --define "OBSR_CLI_VERSION=\"${VERSION}\""
          chmod +x dist/dt-linux-amd64
          cd dist
          tar czf dt-linux-amd64.tar.gz dt-linux-amd64
          sha256sum dt-linux-amd64.tar.gz > checksums.txt

      - name: Verify binary version
        run: |
          set -euo pipefail
          cd apps/cli/dist
          tar -xzf dt-linux-amd64.tar.gz
          PKG_VERSION=$(jq -r .version ../package.json)
          BINARY_VERSION=$(./dt-linux-amd64 --version 2>/dev/null | head -1 | tr -d '\r')
          echo "Package version: $PKG_VERSION"
          echo "Binary --version: $BINARY_VERSION"
          if [ -z "$BINARY_VERSION" ]; then
            echo "ERROR: Could not read version from binary"
            exit 1
          fi
          if [ "$BINARY_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Version mismatch (expected $PKG_VERSION, got $BINARY_VERSION)"
            exit 1
          fi
          rm -f dt-linux-amd64

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        run: |
          cosign sign-blob \
            --output-certificate=apps/cli/dist/checksums.txt.pem \
            --output-signature=apps/cli/dist/checksums.txt.sig \
            --yes \
            apps/cli/dist/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            apps/cli/dist/*.tar.gz
            apps/cli/dist/checksums.txt
            apps/cli/dist/checksums.txt.sig
            apps/cli/dist/checksums.txt.pem
