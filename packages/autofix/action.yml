name: "Detent Autofix"
description: "Automatically fix lint and formatting errors in pull requests. Detects and runs configured linting/formatting tools (Biome, ESLint, Prettier, etc.) and optionally commits the fixes."
author: "Detent"

branding:
  icon: "tool"
  color: "blue"

inputs:
  commit-message:
    description: "Commit message for autofix changes. Supports conventional commit format."
    required: false
    default: "chore: autofix lint/format issues"
  auto-commit:
    description: "Whether to automatically commit and push fixes. Set to 'false' to only run fixes without committing."
    required: false
    default: "true"

outputs:
  files-changed:
    description: "Number of files that were modified by autofix tools"
  committed:
    description: "Whether changes were committed and pushed ('true' or 'false')"
  tools-detected:
    description: "Comma-separated list of detected linting/formatting tools"

runs:
  using: "node20"
  main: "dist/index.js"
  post: "dist/cleanup.js"
  post-if: "always()"
