name: Publish
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  push:
    branches:
      - main
    paths:
      - packages/sdk/.speakeasy/gen.lock
  workflow_dispatch: {}

jobs:
  release:
    name: Create Github Release
    runs-on: ubuntu-latest
    outputs:
      publish_typescript: ${{ steps.release.outputs.publish_typescript }}
      typescript_directory: ${{ steps.release.outputs.typescript_directory }}
    steps:
      - name: Tune GitHub-hosted runner network
        uses: smorimoto/tune-github-hosted-runner-network@v1
      - uses: actions/checkout@v4
      - name: Checkout sdk-generation-action
        uses: actions/checkout@v4
        with:
          repository: speakeasy-api/sdk-generation-action
          ref: v15
          path: _speakeasy
      - id: release
        uses: ./_speakeasy
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          action: release
          speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
          working_directory: packages/sdk
          target: detent

  publish:
    name: Publish Typescript SDK
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.publish_typescript == 'true' }}
    defaults:
      run:
        working-directory: ${{ needs.release.outputs.typescript_directory }}
    steps:
      - name: Tune GitHub-hosted runner network
        uses: smorimoto/tune-github-hosted-runner-network@v1
      - uses: actions/checkout@v4
      - name: Checkout sdk-generation-action
        uses: actions/checkout@v4
        with:
          repository: speakeasy-api/sdk-generation-action
          ref: v15
          path: _speakeasy

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          echo "Detected version: $VERSION"

          if [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE=${VERSION#*-}
            TAG=${PRERELEASE%%.*}
            echo "Prerelease detected; publishing under dist-tag: $TAG"
            npm publish --tag "$TAG" --access public
          else
            echo "Official release detected; publishing under 'latest'"
            npm publish --access public
          fi

      - id: publish-event
        uses: ./_speakeasy
        if: always()
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          action: publish-event
          speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
